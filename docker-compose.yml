services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-Your_strong_password123!}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  backend:
    build:
      context: ./StudentManagementSystem
      dockerfile: StudentManagementSystem/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=db,1433;Database=StudentDB;User Id=sa;Password=${SA_PASSWORD:-Your_strong_password123!};TrustServerCertificate=True;
      Jwt__Key: THIS_IS_A_VERY_LONG_SECRET_KEY_123456789
      Jwt__Issuer: StudentAPI
      Jwt__Audience: StudentAPIUsers
    depends_on:
      - db
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./student-ui
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mssql_data:
